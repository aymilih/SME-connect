<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMEConnect</title>

<style>

:root{
--blue:#2c5cff;
--blue-soft:#eef2ff;
--text:#0f172a;
--muted:#6b7280;
--border:#e5e7eb;
--bg:#f5f6fa;
}

body{
margin:0;
background:#eceef3;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.phone{
width:390px;
height:844px;
background:#0f1115;
border-radius:46px;
padding:12px;
box-shadow:0 30px 70px rgba(0,0,0,.25);
}

.screen{
background:var(--bg);
width:100%;
height:100%;
border-radius:34px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.content{
padding:24px;
flex:1;
overflow:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:28px;
}

.top h1{
margin:0;
font-size:26px;
font-weight:750;
letter-spacing:-.02em;
}

.icons{
display:flex;
gap:12px;
font-size:18px;
}

.balance{
background:var(--blue);
color:white;
padding:22px;
border-radius:20px;
margin-bottom:20px;
}

.balance small{
opacity:.9;
font-weight:500;
}

.balance h2{
margin:8px 0 0 0;
font-size:34px;
font-weight:800;
letter-spacing:-.03em;
}

.actions{
display:flex;
gap:12px;
margin-bottom:28px;
}

.action{
flex:1;
background:white;
border-radius:14px;
padding:16px;
text-align:center;
font-weight:600;
border:1px solid var(--border);
cursor:pointer;
}

.action.primary{
background:var(--blue-soft);
color:var(--blue);
border:1px solid #dbe2ff;
}

.section{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

.tx{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid var(--border);
font-size:16px;
}

.plus{
color:#2563eb;
font-weight:700;
}

.minus{
color:#dc2626;
font-weight:700;
}

.bottom{
height:78px;
background:white;
border-top:1px solid var(--border);
display:flex;
justify-content:space-around;
align-items:center;
font-size:13px;
}

.nav{
text-align:center;
color:#6b7280;
}

.nav.active{
color:var(--blue);
font-weight:700;
}

.nav span{
display:block;
font-size:20px;
margin-bottom:4px;
}

</style>
</head>

<body>

<div class="phone">

<div class="screen">

<div class="content">

<div class="top">
<h1>Bonjour Emilie</h1>
<div class="icons">🌍 🔔</div>
</div>

<div class="balance">
<small>Activité aujourd’hui</small>
<h2>240 500 FCFA</h2>
</div>

<div class="actions">
<div class="action primary">Facturer</div>
<div class="action">Payer</div>
<div class="action">Activité</div>
</div>

<div class="section">Activité récente</div>

<div class="tx">
<span>Client</span>
<span class="plus">+ 2 000 FCFA</span>
</div>

<div class="tx">
<span>Client</span>
<span class="plus">+ 5 000 FCFA</span>
</div>

<div class="tx">
<span>Fournisseur</span>
<span class="minus">− 8 500 FCFA</span>
</div>

</div>

<div class="bottom">

<div class="nav">
<span>⌂</span>
Accueil
</div>

<div class="nav">
<span>⌕</span>
Réseau
</div>

<div class="nav active">
<span>＋</span>
Facturer
</div>

<div class="nav">
<span>◷</span>
Historique
</div>

<div class="nav">
<span>◉</span>
Profil
</div>

</div>

</div>

</div>

</body>
</html>
